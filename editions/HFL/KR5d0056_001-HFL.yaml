front:
  text: 至言緫卷之一去一
  hash: sha256:04f570218483808d2634dfcefb3b2eefff83e0f24ee50d716fe937e024e123d7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0056_HFL_001-001a, image: hfl/0703/0703-004.png}
body:
  text: 會稽禹穴道士范翛然撰齋戒夫入靜修眞要資齋戒檢口愼過其道漸階南華眞經云顔回曰敢問其方仲尼曰齋吾將語若顔回曰回家貧不飲酒不茹葷者數月矣可以爲齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰唯道集虚虚者心齋也又孔子問至道老子曰汝齋戒疏瀹而心澡雪而精神掊擊而智夫道窅然難言哉將爲汝言其崖略玄元皇帝聖紀云按諸經齋法略有三種一者設齋以精德解愆二者節食齋可以和神保壽斯謂祭之齋中士所行也三者心齋論疏瀹其心除嗜慾也澡雪精神去穢累也掊擊其智絶思慮也夫無思無慮則專道無嗜无慾則樂道無累則合道既心無二想故曰一志焉蓋上士所行也夫齋者齊也齊整三業乃爲齊矣若空守節食既深識未齊又唯存一志則口無貪味謂兹二法表裏相資大誡經云夷心靜默專想不二過中不味内外清虚是也孔子雖薄閑節食未解調心故示齋法令其受道而末學之徒孰能虚心一志哉夫鄙乎祭祀之教自謂得心齋之理蓋嗊嗃怠慢之夫矣雖口談空寂無解其自是自務也六種第一上清齋有二法一絶群獨宴靜氣遺形三清壇肅侣依太眞儀格第二靈寳齋有六法一金籙齋救度國王二黄籙齋救抜世祖三明眞齋懺悔九幽四三元齋首謝違犯科戒五八節齋懺洗宿新之過六自然齋爲百姓祈福第三洞神齋精簡爲上絶塵期靈第四太一齋以恭肅爲首第五旨教齋以清素爲貴第六涂炭齋以勤苦爲功此諸齋自古及今登壇告盟啓誓玄聖或三日七日九日十五日皆晝夜六時行道轉經禮懺儀格甚重條列上清絶群獨宴靜氣遺形心齋之外自餘皆是爲國王民人學眞道士拔度先祖己躬謝過禳灾致福之齋此時移代異不無詳略於靈寳齋中或爲半景之齋既無宿請亦無言功唯只一時或兩時懺悔亦不三時上香步虚禮經並闕或小小齋中三禮嘆願隨時去取逐便制宜既非大集心達而已三元品戒經云正月七月十月天地水三官檢勾之日可修齋聖紀云正月七日名舉遷賞上會齋七月七日名慶生中會齋十月五日名建生下會齋此三會齋三官考核功過依日齋戒呈章賞會可祈景福明眞科云正月三月五月七月九月十一月一歲六齋月能修齋上三天帝令太一使者除人十苦八道秘言云正月三月四月六月七月八月九月十月十一月此九眞齋月一日十五日二十九日此月中三齋日正月一日名天臘五月五日名地臘七月七日名道德臘十月一日名民歲臘十二月臘日名王侯臘此五臘日並宜修齋並祭祀先祖明眞科云月一日初八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日此爲十直齋日庚申甲子八節太一八神下司察人過咎修齋太一歡悅庚申日人身中三尸上天言人罪過本命日受法人身神吏兵上天計人功過又甲子日半夜時甲戌日黄昏時己上天星眞官下日甲申日晡時甲午日曰中時已上地星眞官下日甲辰日食時中寅日平旦時已上人星眞官下日其日五嶽四瀆神君各依方位糾察善惡無不上聞又丁卯日日出時丁丑日鷄鳴時己上天皇眞官下日丁酉日日入時丁亥日人定時已上地皇眞官下日丁未日日晡時丁己日禺中時已上日人皇眞官下日其日修齋五岳眞人各遺五神營衛記名仙籙三洞奉道科云正旦爲獻壽齋初七日爲延神齋二月八日爲芳春齋四月八日爲啓夏齋五月五日爲續命齋六月六日爲清暑齋七月七日爲迎秋齋八月一日爲逐邪齋九月九日爲延算齋十月一日爲成福齋十一月十五日爲啓福齋十二月臘日爲百福齋二十八日爲迎新齋立春爲建善齋春分爲延福齋立夏爲長善齋夏至爲朱明齋立秋爲遐齡齋秋分爲謝罪齋立冬爲遵善齋冬至爲廣慶齋如此等齋各具本經儀格故學道不修齋戒徒勞山林矣夫齋者正以清虚恬靜謙卑恭敬戰戰兢兢如履冰谷若對嚴君丹誠謙苦必祈靈應檢勑内外無使喧雜行齋之人特忌斬衰孝子新産婦人月信未斷及害瘡疥諸廢疾等並不得升齋堂庭壇驅使如願苦求預齋乞解過咎者任投詞爲其陳懺悔謝不得雜壇堂宇應行法事等仍遷令别坐兼忌六畜蓋此等人穢觸眞靈賢聖不降乃修齋無功也凡修齋主虔誠齋官整肅至如香燈不備亦曰疏遺啓聖祈眞莫先於此香貴在沉水栴檀依上清香珠丸合和不得用甲麝招眞致靈務存精志如寒棲學眞道士修齋單貧不可致者亦宜以少爲信無令頓闕若雜以乳頭非道家所用也初登齋靜看焚香氣向東南西北直上者五帝依向而至登眞隱訣云香者天眞用兹以通感地衹緣斯以達言非論齋潔祈念存思必燒香左右侍香金童必爲招眞達意登眞隱訣云眞人攝日暉以通照役月精以朗幽故然九光之微燈晃八方之靜夜四極明科云立春春分然九燈於庭立夏夏至然八燈立秋秋分然六燈立冬冬至然五燈本命日十二燈自此陳乞謝過祈恩用燈於庭法與修諸齋自有燈數於庭記依訖四時向王唯本命向太歲叩齒二十四通祝曰高上太眞萬聖帝皇五帝四司總仙監眞今日吉辰八節開陳陽罪陰考絶滅九陰於今承此抜釋七玄免脫火鄉永離刀山三塗五苦不累我身得同天地長保帝晨五願八會靡不如言畢解巾叩頭百二十過當令額向地而已勿令痛竟復巾仰天心念我身今日上享天恩賜反形骸受生飛仙畢仰咽二十四氣止如此三年宿愆並除身與眞同初眞誡天眞言出家超俗皆宿有良契故能獨抜常倫若愼終如始精至修煉當福七祖慶流一門所謂九層之臺起於累土千里之行始於足下乃至功成德就白日昇天故於開度之時宜受初眞之戒其有十爾當而受之第一戒者不得陰賊密謀害物利己當行陰德廣濟群生第二戒者不得殺害含生以充滋味當行慈惠以及昆蟲第三戒者不得溼邪敗眞穢慢靈氣當守貞操使无缺犯第四戒者不得敗人成功離人骨肉當以道助物令九族邕和第五戒者不得讒毁賢良露才揚己當稱人之善不自伐其功能第六戒者不得飲酒過差食肉違禁當調和氣性專務清虚第七戒者不得貪求無厭積財不散當行節儉惠卹貧窮第八戒者不得交游非賢居處穢雜當慕勝己棲集清虚第九戒者不得不忠不孝不仁不信當盡節君親推誠萬物第十戒者不得輕忽言笑舉動非眞當持重寡詞以道德爲務能保此十戒始終無虧則天道佑之神明輔之欲求凶橫不可得也若朝爲夕替泄慢正眞自貽其殃無怨咎於高靈也凡初入道之子可不勗之朝眞朝眞儀云每月一日十五日三元日中庚申甲寅甲子八節三會本命等日並須朝禮若與戊辰戊戌天父天母殺害日帝日殺同者即不可爲之凡朝禮先一日以桃湯澡浴法在解穢篇中並不得食葱韭蒜乳酪等至其日更潔衣服執香爐至靜户叩齒三通微祝曰守靜玉女四明功曹今欲朝禮願通達上聞便開門先前右足至香案前置爐案上執簡平立臨目叩齒三通存思玉童玉女在香案上左右即長跪三捻香訖起平立又微僂身發爐祝曰太上玄元五靈老君當召功曹使者左右龍虎君捧香使者三氣正神急上關啓三天太上玄元道君臣今正爾燒香朝眞願得九天正眞生氣降臣身中令臣所啓速達逕御太清紫微宫至眞玄元大道君几前畢起存心若至今闕前再拜訖又長跪叩齒二十四通祝曰正一盟威弟子某稽首歸身歸神歸命太清玄元無極大道太上老君太上丈人天帝君天帝丈人九老仙都君九氣丈人等百千萬重道氣千二百官君太清玉陛下臣幸資宿慶得奉道眞竊不自揆輒希長生誓以立功改過修德乞願赦臣積生已來至於今日所犯元惡重罪咸賜蕩除許臣自新補復前咎令九祖父母幽魂苦爽皆下拔九幽上昇天衢令臣修道克合誠請削除死籍注上玄籙闔門之内共保元吉生成之惠實在於此臣某叩頭便以簡即叩頭謹啓若更有他事任隨意言之但不得煩之矣訖又再拜便於禮處伏地以簡叩頭摶頰訖復爐祝曰香官使者左右龍虎君捧香使者三氣正神當令朝眞之所自然降金液丹玉芝英百靈衆眞交會在香火前令臣修道克合至眞闔門受福天下蒙恩仙童玉女侍衛香煙傳奏所啓徑御至眞帝前燒香時勿反顧顧則誤眞氣置哀應又勿令囂喧使至平明須了矣解穢沐浴夫神氣清虚眞靈所守身心混濁邪氣害人入靜思眞要須清潔不履衆惡吉祥止焉道士女冠受法己後特忌殗穢諸不宜者不在履限玄都律曰民家殖污不過晦朔不得入治哭亦三日穢三年之喪未滿百日並不得書符奏章朝眞入靜違奪算一紀太極法師曰道士女冠先無殗穢哭亦不殗唯須佩籙着身被懸系臂出後香湯沐浴解殗穢三日已後始得入靜三元品戒曰常以正月十五七月十五十月十五平旦中夜沐浴東向以杓回香湯左轉三十二過閉目思日光在左目上月光在右目上五星纓絡五雲蓋體四靈侍衛訖便叩齒三十二通祝曰天澄氣清五色高明日月吐暉灌我身形神津内澳香湯煉精光景洞曜煥照上清氣不受塵五府納靈罪滅三徒禍消九冥惡根斷絶福慶自生今日大願一切告盟身受開度升入帝庭畢仰咽三十二通止便洗沐畢冠帶衣服又叩齒十二通祝曰五濁以清八景以明今日受煉罪滅福生長與五帝齊眞上靈便出户入室依法行道夫每經一殖皆須沐浴修眞致靈特宜清淨不則多病侍經眞官計人罪過沐浴香湯用竹葉桃枝柏葉蘭香分内水中煮十數沸布囊濾之去滓加五香用之最精解穢夫殗忌臨屍産婦喪家齋食産家三日並滿月食之喪車靈堂見六畜生産抱嬰兒胎穢哭不得言死亡事及不祥事午前忌之不得見血肉死禽獸寢卧櫛髮飲食便曲並不得向北便曲不得視三光餐十二辰肉魚臊五辛並忌言婦人有經通不得近亦不得與同房户寢卧並造醮食及近道場如夢泄亦須解穢若見死屍喪車速存火從己心中直下往燒之赫然死柩喪車並爲灰燼便想烈風吹之又閉日内視令火自焚舉體潔白見穢氣消滅即解矣又存一眞官頭戴籙中九鳳眞官口中含水噴灑穢亦消解又朱書解穢符書時三叩齒穢合明天帝日閉氣書之置水中以刀子左攪水三匝想見北斗星存水中咒曰百殗之鬼速走萬里不走斬死西方白童子急急如律令則含水噴灑穢氣都散歲除日勿得浴元日勿得沐尋常五日一浴十日一沐皆用桃竹至言緫卷之一
