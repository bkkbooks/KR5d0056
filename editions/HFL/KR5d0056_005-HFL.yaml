front:
  text: 至言緫卷之五去五
  hash: sha256:0de2e51912b6e99115af55150ca359f835014637f7f1673dcf3b673fb66746d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0056_HFL_005-001a, image: hfl/0703/0703-104.png}
body:
  text: 會稽禹穴道士范翛然撰補導夫學道之人皆閑安少事不明補導何以資生是以知六籍娛神乃至人之役性彈棋騁妙寔王公之替勞今撰彭老正經一十二首用去衆病以俟津涯老子按摩法兩手相叉相沓共按陛左右同兩手如挽五石力弓左右同兩手作拳向前築虚三五度兩手如拓石法左右同大坐斜身偏欹如排山狀左右同雨手據地縮身曲脊向上三舉以手反槌背左右同大坐申脚三用相當手反掣手向後左右同立地反覆三舉起立以脚踏前後左右同大坐申脚用相當手勾所申脚著膝上以手按之左右同雨手捺䏶左右同捩身二十遍兩手捺䏶左右同抽脅二十徧雨手抱頭左右抽腰二十徧左右抛頭二十徧一手挽頭一手拓膝三折左右同兩脚拓頭三舉之一手拓膝一手拓頭從下至上三過左右同兩手舉頭向下三頓之兩手相叉反著心上三過曲腕築助挽肘左右亦三過反手著膝手挽肘覆手著膝上挽肘左右三過舒手挽項三過左右捩身前後三過摸肩從上至下便三遍左右同外振手三遍又内振手三徧兩手相叉反覆攪各七徧兩手相叉頭上過左右申脅十徧兩手拳反背上屈脊上下三遍屈者指也指訣云導引則氣宣氣宣則神暢内形於外所以無應無方自導引過一月後百病並除百日不輟眉鬢生於靜室中燒香不散亂然後爲也一兩手相捉紐捩如洗手法注云左手爲天右手爲地天地和合鼓動生化則六府開通百神歸附二兩手淺相叉翻向外覆向胸三過注云天地交泰化生萬象反覆其道自内形外所以神同通暢合德而不困也三兩手相重共按陛上徐徐捩身左右同注云萬物祖乎天人祖乎氣陰陽交泰則流通所以覆手向胸捩身徐轉歸本之義於焉在兹四以拳却去此則開胸左右同注云日月卷舒順時息慮爲靈府開則通神也五雨手抱頭宛轉陛左右同注云上黄庭與下丹田通也六兩手拒地回頭反顧如虎視左右同注云拓地户營日虎視則生神通脉節宣元氣是也七兩手急相叉以脚踏手中左右同注云踏手中者取其中和之義和暢骨節之神明歟然則人法天以成形氣與道以合體天有六氣以造達萬物人有六府以度一身動靜適宜用不過極是以天道左轉日月右回鼓之以風雷通之以山澤節宣不應蓄則病生邪氣外侵妄病内擁夭折之理與清淨之性交喪矣是以君子黄中通理順時變通安則閑居以存神用則習妙以布氣反窮天理胎息下元身不病則形神安道養適則妙物應可以飛行自在與太虚齊其終始者也功過夫功過者謂濟生度死自我惠彼者也列紀經曰夫學道之人欲得廣行陰德慈向萬物救人艱危度人厄難輕財重道施惠布德不吝寳賄投之窮地啓誓眞聖虚心跪請也本願經云學昇仙之道當立三十善功故曰功滿三千白日昇仙者也洞神經曰夫人有十善者必生福子二十善神明護己三十善辟除惡鬼四十善人不枉死五十善一身無罪六十善道君自存七十善得與五嶽相連八十善脱名太山九十善必爲神仙百善必昇九天翛然曰此可謂自少及老積行累功無有分毫缺犯純白之人耳若延三千善功則未當之一毛之正矣太虚眞人曰飯百凡人不如飯一善人飯千善人不如飯一學道者老子曰道者百行當備故也千善者當若怠墮雖有九百九十九善不滿中爲利動皆被折過遂失前功若治身關念守戒不廢乃得度世太上科云令教可三過爲一勤勤謂心常濟物孜孜不倦也勸化三户爲一功功謂三户舉家敬信道法長幼孝慈也濟施路窮孤寡三人爲一勤愛推讓財帛有嗔不爭滿三爲一勤凡如此等以類求之元君曰夫一切含氣未有無欲者欲雖無數大略有六一曰五色二曰五音三曰五味四曰五香五曰五柔六曰五達達者皆能辨明悉如無礙次能忘之乃保長生以此理身身必成眞理家家和理郷郷豐乃至天下其德乃普是知求生必先行善三業清淨則萬善備矣人有一善則心定體安十善則氣力强壯二十善則無諸疾病三十善則所求皆得四十善則昌熾富樂五十善則子孫繁息六十善則遭厄得過七十善則天神護之八十善則得地之利九十善則尊賢顯榮一百善則寳瑞降二百善則後代名布三百善則後代大富四百善則後代清貴五百善則後代壽長六百善則後代貴孝七百善則後代智慧八百善則後代道德九百善則後代賢聖一千善則後代神眞二千善則身爲衆人師聖眞仙靈將吏三千善則爲國師聖眞仙曹局四千善則爲天下師聖眞仙主統五千善則爲鬼靈師聖眞仙魁師六千善則爲神明師聖眞仙卿大夫七千善則爲諸天師聖眞仙卿公八千善則爲三千師聖眞仙皇帝九千善則爲元始五帝君一萬善則爲太上玉皇帝元君曰萬善之甚在於三業三業十善生萬名也以類相從明者自照矣凡行善益算行惡奪算賞善罰惡各有職司報應之理毫毛無失自覺有善與上相應彌加精進勿犯前功則計日而仙也故上士學眞無倦過謂己躬不謹動違科禁者也以此將前功而補後過兹獲延齡若以過而能改善莫大矣玄都律曰人身中常有神隨時上天曹白人善惡人滿百二十過爲一病病者令人多凶少利百八十過爲一耗耗者六畜不蕃一百九十過爲一漏漏者善致疾病五百三十過爲一凶凶者破胎傷子七百二十過爲一吹吹者無男多女九百二十過爲一殃殃者喑啞聾盲千八十過爲一禍禍者暴夭死亡千二百過爲一殘殘者出逆亂之人千二百六十過爲一咎咎者絶嗣無子侄千四百過爲一基基者殃流於五世千六百二十過爲一謫謫者斷無後嗣千八百過爲一患患者主爲奴婢千九百八十過爲一橫橫者出顛病狂癡二千一百七十過爲一暴暴者家出兵刃逆死二千三百四十過爲一虐虐者家出反逆父子兄弟自相攻伐二千五百二十過爲一曾曾者家出死肥惡病二千七百過爲一害害者家出男覡女巫二千八百過爲一灾灾者家出骨肉中内亂淫悖二千九百二十過爲一暴暴者家出癃殘三千四十過爲一變變者家出訟獄死門户誅族三千四百二十過爲一悻悻者家出都市乞丐人既死骸骨棄捐三千六百過却爲一病病者滿定應死者也妙眞經云罪莫大於淫禍莫大於貪咎莫大於惜此三者禍之車小則危身大則殘家天下有富貴者三貴莫大於無罪樂莫大於無憂富莫大於知足知足爲足天遺之禄足不知止害乃及己失之而憂得之而喜夫有排門之禁必有折關之咎身死名滅歸流子孫事大以德不以慢於人也故易曰積善之家必有餘慶積不善之家必有餘殃元眞曰夫重長生寳貴一身身及家鄉至於天下爲子盡孝爲臣盡忠爲上盡慈爲下盡順色味調和音聲不滯怡神和志與道合眞也若眞藏一身獨願長生乆住無爲逃避上下不營忠孝不存兼濟背善乖道自是失德縱令棄吾我之歡忘色味之適即同枯木死灰復何足貴乎夫道所貴在適而無累和而常通永劫無窮濟度一切此之長生乃可爲重又長生難得得由忠孝仁義立者生自然長無此德者獨守山林木石爲偶徒自喪生或先罪未釋今又無功遂失人道深可悲乎以能習善生樂常存運之涉惡死苦無極是以上士勤精勇猛積善舍惡永乆長生號爲眞人天地有壞眞人無毁超出三界之上逍遥三清之中常善救物故無棄物人能學之必得成眞人有一惡則心勞體煩十惡則血氣虚盈二十惡則恒多疾病三十惡所求不得四十惡則轗軻衰耗五十惡則絶無子孫六十惡則數得非禍七十惡則鬼物害人八十惡則水火燔漂九十惡則貧窮賤困一百惡則刑獄凶怪二百惡則後世無名三百惡則後代道路乞活四百惡則後代爲奴婢五百惡則後代殘夭六百惡則後代不孝七百惡則後代癡狂八百惡則後代癲愚九百惡則後代破家一千惡則後代妖逆二千惡則身充兵厮三千惡則六病孤窮四千惡則惡病流徙五千惡則爲五獄鬼六千惡則爲二十八獄囚七千惡則爲諸方地獄徒八千惡則入寒冰地獄九千惡則爲入邊底地獄一萬惡則墮薜荔獄夫萬惡之基特由三業一一相生至千萬惡墮薜荔獄永無原期眇眇延康無由解脫不可言哉夫人覺己有惡急宜改之則去道近矣如有魔物亂人當即清潔夕夕悔過自咎自責乃可矣老子稽首曰當朂之焉裴君傳支子三元八節謝過法立春日日中時太極眞君會諸仙人於太極宫刻玉簡記仙名也立夏日日中時五帝會諸仙人於紫微宫見四眞人論其求道者之功罪夏至日日中時五嶽諸眞人詣黄老於黄房雲庭山會諸仙官於日中定天下神圖靈藥之事也秋分日日中時上皇天帝君登廣寒上清虚宅太空之朗丹微紫臺長綿玉樓群眞集於太微之觀上開九天之門詣九天之眞皇中要太上三老君北極諸眞人及八海神下命五岳名山諸仙者靈尊萬萬並會於陽寥之殿共集議天下萬人罪福記欲學道求仙者之勤解疏記功過日月行善惡刑罰之科生死之簿必隨所屬條列又地上乗奸吏部境諸官並糾奏所在道士之功過及萬民有罪應死生者根源條列副命之司命書乎皇録罪福纖芥列於丹誠之籍伏匿之犯惡陰德之細功無不一二鏤引而察之焉也立冬日日中時衆眞仙方諸宫詣東海青童君定衆仙論金書内字右其日日中夜半當出中庭若於淨室北向脫巾再拜長跪上啓太上北極天尊大帝君密自陳立身以來有罪多少伏乞得原赦從今日改往修來之言言必使誓於丹心盟於天地不敢復犯萬惡之行畢乃云所願太上皇帝削某罪名移書三官使神仙之録某厠玉扎長生久視通達諸靈畢又叩頭四下再拜而還深自克責並存念三元中神令上啓太上助己自陳求恩赦也又云八節之日衆仙極會天命衆眞皆當畢集對未節一日萬靈詣關節日日中尊卑入謁節後一日罪福分别三日三夕大事乃畢子其愼罪務爲功德名可上眞列編太極又云秋分日日最重於七節此日謝罪罪必得除而不可更犯十過天地弗赦不可復改若未離人則或恐涉咎者宜便秋分日誓改之辭必須肅然自淨乃可爾君子曰誰人無過過而不改者是謂過矣唯秋分衆聖並會謝過之後不可再犯也至言緫卷之五
