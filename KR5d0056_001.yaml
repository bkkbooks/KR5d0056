front:
  text: 至言總卷之一去一
  hash: sha256:e72330c79cc34b570879e9b3952424c7e7a1f48ad3e6b86455755bf55c9688df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0056_HFL_001-001a, image: hfl/0703/0703-004.png}
body:
  text: 會稽禹穴道士范翛然撰齊戒夫入靜修真要資齊戒檢口愼過其道漸階南華真經云顔回曰敢問其方仲尼曰齊吾將語若顔回曰回家貧不飲酒不茹葷者數月矣可以為齊乎曰是祭祀之齊非心齊也回曰敢問心齊仲尼曰唯道集虛虛者心齊也又孔子問至道老子曰汝齊戒疏瀹而心澡雪而精神掊擊而智夫道窅然難言哉將為汝言其崖略玄元皇帝聖紀云按諸經齊法略有三種一者設齊以精德解愆二者節食齊可以和神保壽斯謂祭之齊中士所行也三者心齊論疏瀹其心除嗜欲也澡雪精神去穢纍也掊擊其智絶思慮也夫無思無慮則專道無嗜無欲則樂道無纍則合道既心無二想故曰一志焉蓋上士所行也夫齊者齊也齊整三業乃為齊矣若空守節食既深識未齊又唯存一志則口無貪味謂兹二法表裏相資大誡經云夷心靜默專想不二過中不味內外清虛是也孔子雖薄間節食未解調心故示齊法令其受道而末學之徒孰能虛心一志哉夫鄙乎祭祀之教自謂得心齊之理蓋嗊嗃怠慢之夫矣雖口談空寂無解其自是自務也六種第一上清齊有二法一絶群獨宴靜氣遺形三清壇肅侣依太真儀格第二靈寶齊有六法一金籙齊救度國王二黃籙齊救拔世祖三明真齊懺悔九幽四三元齊首謝違犯科戒五八節齊懺洗宿新之過六自然齊為百姓祈福第三洞神齊精簡為上絶塵期靈第四太一齊以恭肅為首第五旨教齊以清素為貴第六涂炭齊以勤苦為功此諸齊自古及今登壇告盟啓誓玄聖或三日七日九日十五日皆晝夜六時行道轉經禮懺儀格甚重條列上清絶群獨宴靜氣遺形心齊之外自餘皆是為國王民人學真道士拔度先祖己躬謝過禳灾致福之齊此時移代異不無詳略於靈寶齊中或為半景之齊既無宿請亦無言功唯只一時或兩時懺悔亦不三時上香步虛禮經並闕或小小齊中三禮嘆願隨時去取逐便制宜既非大集心達而已三元品戒經云正月七月十月天地水三官檢勾之日可修齊聖紀云正月七日名舉遷賞上會齊七月七日名慶生中會齊十月五日名建生下會齊此三會齊三官考核功過依日齊戒呈章賞會可祈景福明真科云正月三月五月七月九月十一月一歲六齊月能修齊上三天帝令太一使者除人十苦八道祕言云正月三月四月六月七月八月九月十月十一月此九真齊月一日十五日二十九日此月中三齊日正月一日名天臘五月五日名地臘七月七日名道德臘十月一日名民歲臘十二月臘日名王侯臘此五臘日並宜修齊並祭祀先祖明真科云月一日初八日十四日十五日十八日二十三日二十四日二十八日二十九日三十日此為十直齊日庚申甲子八節太一八神下司察人過咎修齊太一歡悅庚申日人身中三尸上天言人罪過本命日受法人身神吏兵上天計人功過又甲子日半夜時甲戌日黃昏時己上天星真官下日甲申日晡時甲午日曰中時已上地星真官下日甲辰日食時中寅日平旦時已上人星真官下日其日五嶽四瀆神君各依方位糾察善惡無不上聞又丁卯日日出時丁丑日雞鳴時己上天皇真官下日丁酉日日入時丁亥日人定時已上地皇真官下日丁未日日晡時丁己日禺中時已上日人皇真官下日其日修齊五嶽真人各遺五神營衛記名仙籙三洞奉道科云正旦為獻壽齊初七日為延神齊二月八日為芳春齊四月八日為啓夏齊五月五日為續命齊六月六日為清暑齊七月七日為迎秋齊八月一日為逐邪齊九月九日為延算齊十月一日為成福齊十一月十五日為啓福齊十二月臘日為百福齊二十八日為迎新齊立春為建善齊春分為延福齊立夏為長善齊夏至為朱明齊立秋為遐齡齊秋分為謝罪齊立冬為遵善齊冬至為廣慶齊如此等齊各具本經儀格故學道不修齊戒徒勞山林矣夫齊者正以清虛恬靜謙卑恭敬戰戰兢兢如履冰谷若對嚴君丹誠謙苦必祈靈應檢勑內外無使喧雜行齊之人特忌斬衰孝子新産婦人月信未斷及害瘡疥諸廢疾等並不得升齊堂庭壇驅使如願苦求預齊乞解過咎者任投詞為其陳懺悔謝不得雜壇堂宇應行法事等仍遷令别坐兼忌六畜蓋此等人穢觸真靈賢聖不降乃修齊無功也凡修齊主虔誠齊官整肅至如香燈不備亦曰疏遺啓聖祈真莫先於此香貴在沉水栴檀依上清香珠丸合和不得用甲麝招真致靈務存精志如寒棲學真道士修齊單貧不可致者亦宜以少為信無令頓闕若雜以乳頭非道家所用也初登齊靜看焚香氣向東南西北直上者五帝依向而至登真隱訣云香者天真用兹以通感地只緣斯以達言非論齊潔祈念存思必燒香左右侍香金童必為招真達意登真隱訣云真人攝日暉以通照役月精以朗幽故然九光之微燈晃八方之靜夜四極明科云立春春分然九燈於庭立夏夏至然八燈立秋秋分然六燈立冬冬至然五燈本命日十二燈自此陳乞謝過祈恩用燈於庭法與修諸齊自有燈數於庭記依訖四時向王唯本命向太歲叩齒二十四通祝曰高上太真萬聖帝皇五帝四司總仙監真今日吉辰八節開陳陽罪陰考絶滅九陰於今承此拔釋七玄免脫火鄉永離刀山三塗五苦不纍我身得同天地長保帝晨五願八會靡不如言畢解巾叩頭百二十過當令額向地而已勿令痛竟復巾仰天心念我身今日上享天恩賜反形骸受生飛仙畢仰咽二十四氣止如此三年宿愆並除身與真同初真誡天真言出家超俗皆宿有良契故能獨拔常倫若愼終如始精至修煉當福七祖慶流一門所謂九層之臺起於纍土千里之行始於足下乃至功成德就白日升天故於開度之時宜受初真之戒其有十爾當而受之第一戒者不得陰賊密謀害物利己當行陰德廣濟群生第二戒者不得殺害含生以充滋味當行慈惠以及昆蟲第三戒者不得溼邪敗真穢慢靈氣當守貞操使無缺犯第四戒者不得敗人成功離人骨肉當以道助物令九族雍和第五戒者不得讒毁賢良露才揚己當稱人之善不自伐其功能第六戒者不得飲酒過差食肉違禁當調和氣性專務清虛第七戒者不得貪求無厭積財不散當行節儉惠恤貧窮第八戒者不得交游非賢居處穢雜當慕勝己棲集清虛第九戒者不得不忠不孝不仁不信當盡節君親推誠萬物第十戒者不得輕忽言笑舉動非真當持重寡詞以道德為務能保此十戒始終無虧則天道佑之神明輔之欲求凶橫不可得也若朝為夕替泄慢正真自貽其殃無怨咎於高靈也凡初入道之子可不勗之朝真朝真儀云每月一日十五日三元日中庚申甲寅甲子八節三會本命等日並須朝禮若與戊辰戊戌天父天母殺害日帝日殺同者即不可為之凡朝禮先一日以桃湯澡浴法在解穢篇中並不得食葱韭蒜乳酪等至其日更潔衣服執香爐至靜户叩齒三通微祝曰守靜玉女四明功曹今欲朝禮願通達上聞便開門先前右足至香案前置爐案上執簡平立臨目叩齒三通存思玉童玉女在香案上左右即長跪三捻香訖起平立又微僂身發爐祝曰太上玄元五靈老君當召功曹使者左右龍虎君捧香使者三氣正神急上關啓三天太上玄元道君臣今正爾燒香朝真願得九天正真生氣降臣身中令臣所啓速達徑御太清紫微宫至真玄元大道君几前畢起存心若至今闕前再拜訖又長跪叩齒二十四通祝曰正一盟威弟子某稽首歸身歸神歸命太清玄元無極大道太上老君太上丈人天帝君天帝丈人九老仙都君九氣丈人等百千萬重道氣千二百官君太清玉陛下臣幸資宿慶得奉道真竊不自揆輒希長生誓以立功改過修德乞願赦臣積生已來至於今日所犯元惡重罪咸賜蕩除許臣自新補復前咎令九祖父母幽魂苦爽皆下拔九幽上升天衢令臣修道克合誠請削除死籍注上玄籙闔門之內共保元吉生成之惠實在於此臣某叩頭便以簡即叩頭謹啓若更有他事任隨意言之但不得煩之矣訖又再拜便於禮處伏地以簡叩頭摶頰訖復爐祝曰香官使者左右龍虎君捧香使者三氣正神當令朝真之所自然降金液丹玉芝英百靈衆真交會在香火前令臣修道克合至真闔門受福天下蒙恩仙童玉女侍衛香煙傳奏所啓徑御至真帝前燒香時勿反顧顧則誤真氣置哀應又勿令囂喧使至平明須了矣解穢沐浴夫神氣清虛真靈所守身心混濁邪氣害人入靜思真要須清潔不履衆惡吉祥止焉道士女冠受法己後特忌殗穢諸不宜者不在履限玄都律曰民家殖污不過晦朔不得入治哭亦三日穢三年之喪未滿百日並不得書符奏章朝真入靜違奪算一紀太極法師曰道士女冠先無殗穢哭亦不殗唯須佩籙著身被懸系臂出後香湯沐浴解殗穢三日已後始得入靜三元品戒曰常以正月十五七月十五十月十五平旦中夜沐浴東向以杓回香湯左轉三十二過閉目思日光在左目上月光在右目上五星纓絡五雲蓋體四靈侍衛訖便叩齒三十二通祝曰天澄氣清五色高明日月吐暉灌我身形神津內澳香湯煉精光景洞曜煥照上清氣不受塵五府納靈罪滅三徒禍消九冥惡根斷絶福慶自生今日大願一切告盟身受開度升入帝庭畢仰咽三十二通止便洗沐畢冠帶衣服又叩齒十二通祝曰五濁以清八景以明今日受煉罪滅福生長與五帝齊真上靈便出户入室依法行道夫每經一殖皆須沐浴修真致靈特宜清淨不則多病侍經真官計人罪過沐浴香湯用竹葉桃枝柏葉蘭香分內水中煮十數沸布囊濾之去滓加五香用之最精解穢夫殗忌臨尸産婦喪家齊食産家三日並滿月食之喪車靈堂見六畜生産抱嬰兒胎穢哭不得言死亡事及不祥事午前忌之不得見血肉死禽獸寢卧櫛髮飲食便曲並不得向北便曲不得視三光餐十二辰肉魚臊五辛並忌言婦人有經通不得近亦不得與同房户寢卧並造醮食及近道場如夢泄亦須解穢若見死尸喪車速存火從己心中直下往燒之赫然死柩喪車並為灰燼便想烈風吹之又閉日內視令火自焚舉體潔白見穢氣消滅即解矣又存一真官頭戴籙中九鳳真官口中含水噴灑穢亦消解又朱書解穢符書時三叩齒穢合明天帝日閉氣書之置水中以刀子左攪水三匝想見北斗星存水中咒曰百殗之鬼速走萬里不走斬死西方白童子急急如律令則含水噴灑穢氣都散歲除日勿得浴元日勿得沐尋常五日一浴十日一沐皆用桃竹至言總卷之一
