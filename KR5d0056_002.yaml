front:
  text: 至言總卷之二去二
  hash: sha256:c4debc7f90d2f92fa98064f24f1c0426df014c82b82c64a99468e3e6b90da84c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0056_HFL_002-001a, image: hfl/0703/0703-028.png}
body:
  text: 會稽禹穴道士范翛然撰養生嚴君平老子指歸曰游心於虛靜結志於微妙委慮於無欲歸計於不為故能違生延命與道為友神農經曰食草者壯健多力食肉者勇悍輕疾食谷者智慧聰明食石者肥澤不老謂煉五石者也食芝者延年不死食元氣者地不能埋天不能殺是故食良藥與天相畢日月列導中經地不滅孔子家語曰食水者善浮水而耐寒謂因水而食也食土者無心而不息蚯蚓之類食木者多力不治熊象駱駝之類也準南子曰多力而拂之戾戾不治之類也食桑者有緒而蛾蠶是也食氣者神明而壽仙人是也食穀者智慧而夭人是也不食者不死而神直任喘息而無思慮傳曰雜食者百病妖邪所鍾焉所食愈少心愈開年愈益所食愈多心愈塞年愈損矣道機經曰人生而命有長短者非自然也皆由將身不謹飲食過差淫泆無度忤逆陰陽魂神不守精竭命衰而病萌生故不能終其壽也老子謂文子曰理身者太上養形神清意平百節皆寧養生之本也肥肌膚充肚腹開嗜欲養生之末也人能養其本者節寢處適飲食和喜怒便動靜內在己者得而邪氣無由入飾其外者傷其內扶其情者害其神見其文者蔽其真故羽翼美者傷其骸骨枝葉茂者害其根荄是以靜漠恬淡所以養生也和愈虛無所以據德也外不亂內即性得其宜靜不動和即神得其安其謂養生以經世抱德以經年可謂體道焉玄妙內篇老子曰木氣至則骨節强土氣至則肌膚充金氣至則齒爪嚴火氣至則五體溫水氣至則潤澤豐風氣至則氣息流通旋行體中風氣退則氣息逝水氣退則潤澤竭火氣退則溫暖歇金氣退則齒弱土氣退則肌膚虛木氣退則骨節弊勤導氣養性以保六合者也老子西升經曰僞道養形真道養神真神通道能亡能存神能飛形並能移山形為灰土其何識焉又曰人愛人不如愛身愛身不如愛神愛神不如舍神舍神不如守身守身長久長存也故神生於形形成於神形不得神不能自生神不得形不能自成形神合同更相生更相成神常愛人人不愛神故絶聖棄智歸元為也又曰聖人常安與天地俱安而鬼神通衆人皆安而所不安矣蓋天道惡盈滿補虛空毁强盛益衰弱損思慮歸童蒙塞邪智聖人之朴也是以天下上孝可謂養母常愛其母身可長久河圖帝視萌曰侮天地者凶順天時者吉春夏樂山高處秋冬居卑深藏吉利多福壽老無窮洛書寶豫命曰古人治病之方和以醴泉潤以氣藥不辛不苦甘甜多味常能服之津流五藏繫在心肺終身無患小有經曰少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡行此十二少養生之都契也多思則神殆多念則志散多欲則損智多事則形疲多語則氣爭多笑則傷藏多愁則心懾多樂則意溢多喜則妄錯昏亂多怒即百脉不定多好即專迷不治多惡即憔悴無歡此十二多不除喪生之本也唯無多者幾近真人矣大有經曰或疑者云始同超於無物終受氣於陰陽載形魄於天地資生長於食息而有愚有智有强有弱有壽有夭天耶人耶解者曰形生愚智天也强弱壽夭人也天道自然人道自己始於胎氣充實生而乳哺有餘長而滋味不足壯而聲色有節者强而壽始而胎氣虛耗生而乳哺不足長而滋味有餘壯而聲色自放者弱而夭生長而合足加之以道養年未可量也太史公司馬談曰夫神者生之本形者生之具也神大用則竭形大勞則弊神形騷動欲與天地長久非所聞也故人所以生者神也神所託者形也神離則死死者不可復生離者不可復返故聖人重之夫養生之道有都領大歸未能動而曲會但思與之俗反與俗反則暗勝徹獲過半之功矣有心之徒可不察歟青牛道士封君達曰其養性之法即可施用其大略體欲常勞食欲常少勞無過極少無過虛去肥膿節鹹酸靜思慮損喜怒除馳逐愼房室春夏施瀉秋冬閉藏則可幾於道矣潁川胡昭字孔明曰常人不得無欲又復不得無事但當和心約念靖身損物先去亂神犯性者此嗇神之一術黃帝中經曰夫禀五常之氣有靖有躁剛柔之性不可易也靖者不可令躁躁者不可令靖靖者躁者各有其性違之則失其分恣之則害其生故靖之弊在不開通躁之弊在不精密治生之道愼其性因其分使抑引隨宜損益以漸則各得適矣然靖者壽躁者夭靖而不能養减壽躁而能養延年然靖易御躁難將盡愼養之宜者靖亦可養躁亦可養也髮者血之窮也齒者骨之窮也爪者筋之窮也千過梳頭髮不白朝夕啄齒齒不齲爪不數截筋不替中經曰語笑欲令至少不欲令聲高當虛心下氣與人不競若過語笑損肺傷腎精神不定言語過多則肺傷口燥笑過多則腎轉腰痛此其效驗者也射獵捕搏喜而大笑者絶藏氣或有即惡者設令當時未覺一二年後發病良醫所不能治夫五穀充肌體而不能益壽百藥療疾延年而不能切口切口充肌者俗人所珍若延年者道之所寶素問黃帝問岐伯曰余聞上古之人春秋皆及度百歲而動作不衰血氣而壯今時之人年半百而動作皆衰者時世異耶人將失之耶岐伯曰上古之人其知道者法於陰陽和於術數房中交接之法也飲食有節超居有度不妄作勞故能形與神俱而盡終其天年年度百歲今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂超居無節故度半百而衰也黃帝曰余聞上古聖人論理人形别藏府正絡脉經合遇六合各從其經氣穴所發各有處所各有分部逆順各有條理四時陰陽盡有經紀外內之應皆有表裏其信然乎岐伯曰夫上古聖人之數也下皆為之虛邪賊風避之有時恬淡虛無其心真氣從之精神內守病安從來是以其心間安而不懼形勞而不倦氣順欲從皆得所願故美其食任其服樂其俗高下相慕故曰其民朴是以嗜欲不能勞其目溼邪不能惑其心賢愚不能懼於物故合於道數故能年度百歲而動作不衰者以德全而不危也黃帝針經曰願聞邪溼泮衍之道奈何岐伯曰邪從外襲內而來有定舍也反淫於藏與營衛俱行而與魂魄飛揚使人卧不得安而夢氣淫於府則有餘於外不足於內氣淫於藏則有餘於內不足於外陰氣盛則夢涉大水而恐懼陽氣盛則夢涉炎火而燔焫陰陽俱盛則夢相救上盛則夢飛下盛則夢墮甚飽則夢與甚飢則夢取肝盛則夢怒肺盛則夢恐怕飛揚心氣盛則夢喜笑恐畏脾氣盛則夢歌樂體重而不舉腎氣盛則夢腰脊兩不屬厥氣客於心則夢見山丘爝火厥氣客於肺則夢見飛揚見金鐵之氣奇物厥氣客於肝夢見山林樹木厥氣客於脾則夢見丘陵大澤壞屋風雨厥氣客於腎則夢見臨淵沒於水中厥氣客於膀胱則夢見行厥氣客於胃則夢見飲食厥氣客於大腸則夢見田野厥氣客於小腸則夢則聚邑街衢厥氣客於膽則夢見鬥訟自刳厥氣客於陰則夢見接內厥氣客於頂則夢斬首厥氣客於跡則夢見行走而不前及居深地穽中厥氣客於股肱則夢禮節拜跪厥氣客於胞則夢見溲便黃帝曰春三月此謂發陳天地俱生萬物以榮夜卧早起廣步於庭被發緩形以使志生生而勿殺與而勿奪賞而勿罰此春氣之應也養生之道也逆之則傷於肝夏為寒為變奉長者少夏三月此謂蕃秀天地氣交萬物華實夜卧早超無厭於日使志無怒使英成秀使氣得泄若所愛在外此夏氣之應也長養之道也逆之則傷心秋為痎瘧則奉收者少冬至重病秋三月此謂容平天氣以急地氣以明早卧早起與雞俱興使志安寧以緩利形收斂神氣使秋氣平無外其志使肺氣清此秋氣之應也養收之道也逆之傷肺冬為餐泄則奉藏者少冬三月此謂閉藏水冰地坼無擾乎陽早卧晚起必待日光使志若伏若匪若有私意若己有得去寒就溫無泄皮膚無使氣極奪此冬氣之應養藏之道也逆之則傷腎春為痿厥則奉生者少是以聖人順之故身無其疾萬物不失生氣不竭逆春氣則少陽不生而肝氣內變逆夏氣則太陽不長心氣內洞逆秋氣則太陽不收而肺氣焦滿逆冬氣則少陰不藏而腎氣濁沉夫四時陰陽者萬物之根氣也是以聖人春夏養陽秋冬藏陰以順其根故與萬物沉浮於生長之門肝色青宜食鹹大豆豕肉栗皆鹹也心色赤宜食酸麻犬肉李皆酸也肺色白宜食甘稻米牛肉棗皆甘也脾色黃宜食苦麥羊肉杏皆苦也腎色黑宜食辛黃黍雞肉桃皆辛也辛散酸收甘緩苦堅鹹濡凡毒藥攻邪五穀為養五果為助五畜為益氣味合而服之精氣長益此五味者辛甘苦鹹酸各有所利或散或收或緩或堅或濡此四時五藏所病五味所宜也久視傷血久卧傷氣久立傷骨久行傷筋久坐傷肉是謂五勞所傷也凡貴脫勢者雖不中邪精神內傷身必死亡非妖禍外至直由冰炭內結則傷崩中嘔血而亡者也始富後貧雖不傷邪皮焦屈筋委辟內為率貧富之於人利害猶輕於權勢故疾疴止於形骸而已矣夫養性者欲使習以成性性自為善不習而無不利也性既自善而外病皆悉不生禍亂不作此養性之大經也善養性者則治未病之病故養性者不但餌藥食霞其在於五常俱全百行周備雖絶藥餌足以遐年德行不充縱玉酒金丹未能延年壽故老子曰陸行不畏虎兕者此則道德之祐也豈假服餌而祈遐年哉聖人所以和藥者以救無行之人也故不悟過者抱病歷年而不修一行纏疴沒齒終無悔心此其所以岐和長游彭附永歸良有以也嵇康曰養生有五難名利不去為一難喜怒不除為二難聲色不去為三難滋味不絶為四難神慮精散為五難五者不徙雖心希難老口誦至言咀嚼英華呼吸太陽不能回其操不免夭其年五者無於胸中則信順日濟道德日全不祈禱而有神不求壽而延年此亦養生之大經也然或有服膺仁義無甚奉之纍者抑亦亞乎岐伯曰人年四十而養陰氣自半也起居衰矣年五十體重耳目不聰明年六十陰委氣大衰九竅不利下虛上實涕泣俱出故曰知之則强不知之則老故曰同出而異名智者察其同愚者察其異愚者不足智者有餘則耳目聰明身體輕强年老須壯壯者益理是以聖人為無為事無事樂恬淡虛無之境縱欲快志得虛無之守故壽命無窮與天地終始此聖人之理身也真人曰雖當服餌而不知養性之術亦難以長生也養性之道不欲飽食便卧及終日久坐皆損壽也欲少勞但莫大疲及强所不堪耳人食畢當行步躊躇有所循為快也故流水不腐户樞不蠹其勞動故也人不可夜食食畢但當行步計使十數里往來飽食即卧生百病不消散久成積聚食少而數不欲頓多難消也常欲令如飽中飢飢中飽善養性者先飢乃食先渴後飲食畢當行行畢使人以粉摩腹上數百遍易消大益人令人能食無病暮卧當閉口口開即失氣邪入卧欲屈膝側卧不欲如尸愼之夫欲快意任懷自謂達識知命不泥異正極情肆力不營持久者聞此言雖風之過耳電之經目不足喻也雖身枯於流連之中氣絶於綺紈之間而甘心焉亦安可告之以養性哉匪唯不納反謂妖訛也而望彼信之所謂明鏡給於矇瞽絲竹娛於聾夫者也抱朴子曰一人之身一國之象也胸腹之位猶宫室也四肢之列猶郊境也骨節之分猶百官也神猶君也血猶臣也氣猶民也故能理民則能治國也夫愛其民所以安其國愛其氣以全其身民散國亡氣竭則形死死者不可生也亡者不可存也是以至人消未起之患治未病之疾醫之於無事之前不追之既逝之後民難養而易危氣難清而易濁故審威德所以保杜稷割嗜欲所以固血氣然後真一存焉三七守焉百害却焉年壽延焉人年五十至於一百美藥勿離手善言勿離口亂想勿經心恆以深心至誠恭敬於物愼勿詐善以悅於人道基經云枕高則肝縮枕下則肺騫以四寸為平枕席令軟其息乃長道林品及觀門經行氣枕高二寸半太清經下卷神枕法云五月五日若七月七日取山林柏為枕長一尺二寸高四寸空中容一斗二升令廣三寸五分柏心赤者為蓋厚四分蓋上為三行每行四十孔凡百二十孔孔容一黍粟乃取藥內中用之也芎窮當歸白芷辛夷杜衡山蘇藁本木蘭肉蓯蓉柏實薏苡人蘼蕪款冬花白鮮秦椒桂心乾薑飛廉防風人參桔梗白斂荆實蜀椒右二十四味以應二十四氣又加八毒藥以應八風為頭附子藜蘆皂莢芮草礜石半夏細辛右共合三十二味皆㕮咀以毒藥居草香下按次滿枕中為布囊以衣枕枕之百日筋骨徑强面有光一年身盡香四年白髮黑落齒生常别作一章囊卧起輒盛覆之勿令氣泄年易新藥令三十二種藥令得一斗二升者一種轉取屑三合七圭八撮五分之四也且藥有體重虛實又應作稱兩率取之今按大散家品藥云术十兩六銖得一升四合乾薑三兩二十銖得五合桂心三兩十四銖得五合防風二兩四銖得四合桔梗二雨九銖得四合人參一兩二十銖得三合黃苓十七銖得一合細辛一兩二十一銖得三合附子十九銖得一合茯苓十八銖得一合譽石一兩六銖得一合牡蠣十六銖得一合此並諸藥之舊率合應分等枕藥先各各依式量之也至言總卷之二
