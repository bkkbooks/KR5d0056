front:
  text: 至言總卷之三去三
  hash: sha256:65b71e9cc246001a09fead3072d26c25a990ed424fca15b4e1381b47a8624976
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0056_HFL_003-001a, image: hfl/0703/0703-056.png}
body:
  text: 會稽禹穴道士范翛然撰禁忌王珉山人養生方論云病由口入節宣方也生勞敗靜養道性也酸鹹以時禮醫具也補瀉以性草經明也性調乎食命延乎藥斷可識也兩蓼害筋蒜韭傷血生葷損氣葱臊炙神理生之明戒也白蒿苄音下苗地黃苗也惡實牛蒡苜蓿四物濟身之要也退與不退寡之於思慮進與不進在秉之常志凡一切五辛皆害於藥力又薰人神氣凡桃李藝臺蒜韭等不宜丈夫亦宜少食漸斷凡人年四十己下不宜全食補丸散為陰氣尚未足陽氣尚盛之故也特宜愼之就補中有延緩和通者可矣酉後不飲食若冬月夜長及性熱少食溫軟物食訖搖動令消不爾成腳氣入春宜晚脫綿衣令人傷寒霍亂不消食頭痛衝熱汗出不宜洗身漱口令人五藏乾少津液卧不用著燈及被覆頭面兼不用開口冬夏不用枕冷物鐵石等令人眼暗抱朴子曰或問所謂傷之者色欲之間乎答曰亦何獨斯哉然長生之要其在房中之道上士知之可以延年除病其次不以自伐若年尚少壯而知還陰丹以補腦採七液於長谷者不能服藥物不失三百歲但不得仙耳不知其術者古人方之於冰坯之拒盛湯羽苞之中蓄火者也且又才所以不逮而困思之傷也力所以不勝而强舉之傷也深憂重恚傷也悲哀憔悴傷也喜樂過差傷也汲汲所欲傷也戚戚所憂傷也久談言笑傷也寢息失時傷也挽弓引弩傷也沉醉嘔吐傷也飽食即卧傷也跳走喘乏傷也歡呼哭泣傷也陰陽不交傷也積陽至盡至盡則亡非道也是以養性之方唾不遠行不疾步耳不極聽目不極視坐不至疲卧不至懻懻居致反冀强也直也先寒而衣先熱而解不欲極飢而食不欲渴而飲食不過多凡食過多即結積聚飲過多則成痰癖不欲甚勞不欲甚逸不欲甚流汗不欲多唾不欲奔車走馬不欲極目遠望不欲多啖生冷不欲飲酒當風卧不欲數沐浴不欲廣志遠求不欲規造異巧冬不欲極溫夏不欲極凉不欲露星下不欲卧中見扇大寒大熱大風大露皆不欲冒之五味不欲偏多故酸多則傷脾苦多則傷肺辛多即傷肝鹹多則傷心甘多則傷腎此五行自然之理凡言傷者亦不便覺謂久則損壽耳是以善攝生者卧起有四時之早晚興居而有至和之常制筋骨有偃仰之方杜間邪有吞吐之術流行榮衛有補瀉之法節宣勞逸有與奪之要忍怒以養陰氣抑喜以養陽氣然後先將草木以救虧缺服金丹以定不窮養性之道盡於此矣黃帝曰一日之忌夜莫飽食一月之忌暮莫大醉一歲之忌暮莫遠行終身之忌暮莫燃燭行房勿得起恨於常以息怨仇一切溫食及酒漿臨上看不見物影者勿食成卒病若已食腹脹者急以藥下之諸熱食鹹物竟不得飲食冷水酢漿水令失聲也酒可以和諸藥物服氣辟穀兼先有宿疾應下藥所須飲三二盞可通暢傷多則暢極醉有腐腸爛脾潰髓蒸筋之毒傷損壽命五情昏亂特宜忌之穎川韓融字元長曰酒者五穀之華味之至也亦能益人亦能損人若服散藥過飽滿失飢虛犯風寒觸霧露者節其分劑而飲之宣消邪氣却風禦寒藥之效驗莫過於酒血脉養性者所宜愼也又酒令人假健醒時所以不欲不能醉皆强為之積習轉久升量轉多酒熱不腹為用體氣漸弱精神昏亂害性喪生之所由也凡人不得北首而卧卧之勿留燈令魂魄六神不安多愁恐亦不可北向吃食北向尿北向久坐思惟不祥超勿北向唾罵犯魁罡神勿北向冠帶勿怒目視日月光令人失明凡大汗勿脫衣得偏風半身不遂凡熱食汗出勿蕩風發疰頭痛令人目泄饒卧睡勿歌不祥起卧勿大語損氣力卧時頭邊勿安爐火火氣蒸人目赤及鼻乾目暗冬日溫足凍腦春秋足腦俱凍此聖人之常道旦起勿嗔恚旦下牀勿叱呼勿惡言勿舉足向火對竈罵詈勿咨嗟吁奈何聲此名請禍特忌之勿堅膝坐而交臂膝上勿令髮覆面皆不祥清日一聞諸善事聞惡事即於所來方唾之吉惡夢旦不用說以含水向東方噴之云惡夢著草木好夢成寶玉即無咎矣凡上牀先脫左足履或遠行乘車馬不用回顧則神去人凡一切翾飛蠧動不可故殺傷損至於龜蛇此二物有靈異於他族或誤殺他有靈者或陰精害人深宜愼愼勿陰霧中遠行也凡行來坐卧常存北斗魁罡星在人頭上所向皆吉勿食父母兄弟及自身本命等肉令人魂魄飛揚家出不孝悌子息凡旦起著衣誤翻著者云吉利便著無苦也衣有光當三振之云殃去殃去則無害勿塞井及水溝瀆令人目盲向午後陰氣起不可沐髮令人心虛饒汗多夢頭風也諸應渡溪水溪中先有沙虱水弩者勿在水中浴欲渡時待驢馬渡後而渡有射公者射人影即死先以物打水水弩即發發後急渡無妨夫山有為土出泉者不可久居常食作癭病人不得喜發卒瘡諸山有孔曾採銅寶者唯三月九月可餘月山閉氣入者卒死老子養生經曰人飲食愼勿伏食凶熱食勿令汗液流入食中傷人食冷物令齒痛食熱物令灼唇食畢當摩腹二三百下以來除去百病水銀不得近牙齒發齗腫善落齒礬石不生入藥食之中破人心肝凡服仙藥常向本命服畢勿道死喪事凶事犯傷胎神徒服無益也服神藥勿北向亥子日勿服藥沈義口訣云道士結頭理髮及飲食施為履屐枕褥皆勿令非道者見而干犯之陳安世口訣云服食藥物不欲食蒜及石榴子猪肉犬肉黃石公口訣云桂不可日日嚼之損骨壞筋空腹不用見臭尸尸氣入脾令舌上生白膜起口常臭宜飲少酒見之稍可終不如不見觸寒來寒未解食熱食成刺風飽食竟沐髮作頭風凡銅器蓋食汗出入食中發惡瘡內疸熱食出勿洗面失顔色及面無光又如蟲行飲水勿急咽久成氣病及水瘕瘕者癥也飽食竟勿即卧久作氣病令背痛傷飢卒飽久成心瘕及癖飽食走馬久成心瘕飲水大走傷心久成心疢飽食大走成氣大渴氣不行大飽氣不藏勿食生肉脹胃大食傷膀胱及百脉閉塞冷食傷腸熱食傷胃酸蜜勿食多令人泄下向水漿不見影勿食桃李味酸多食令人熱杏酸多食傷筋骨損人壽命梨味苦令人寒中痎金瘡及産婦勿食櫻桃蒲桃味甘治腸間水調中利小便作酒長飲之佳苽者一名水芝生利水道生果作病者其莖蒂煮汁下除之亦吐薤味辛利病人除寒熱搗之塗金瘡去水氣夫一切葷物並傷氣不可食至於薤雖輩不同五辛例甚溫中補骨宜久食令人利中損陰氣傷筋穬麥味甘除熱芹味辛除腎邪氣久食令人寒中大麥味酸食之令人多熱無夷味辛除邪久食調五藏殺長蟲小麥味甘下熱除腸熱也稻米味甘令人多熱宜久食作青精䭀飯食之延年長生而不死仙人青飯歌云南山有木字俠叔俠叔南燭草名常能服之玉女逐田中有草名為煙能令口香益玉泉何不為之日月遄為煙即稻中為香米也可作䭀飯虛而受色也大豆令人身重多熱蔓菁一名蘿蔔味苦利五藏輕身益氣又王山人養生方論云蘿蔔消食下痰癖甚宜人生熟俱善冬苽下腳氣胡苽蓼子冬苽醋鹹芥己上並傷筋下藥動風萵苣令人寒中傷骨水節變人黑髮成白蘭香胡荽藝臺並損人斜蒿蔓菁葅食之平葵夏不可食冬月乾者熱發時煮蘿蔔齏下之甚利大小腸通滯氣以冬月澀熱人喫一頓無妨常食則損故經曰十日一葵羹焉甘菊溫堪食與丹石不相宜苟杞堪吃發丹石少食溫久微寒好椒常食中食之甚好明目黑髮安平崔實字子真四民月令曰五月是仲夏月也至日也陰陽爭血氣散先後日至各五日寢别內外是月止聲色也陰氣入藏腹中寒不能化膩先後日至日各十日無滋味少食肥膿距立秋無食煮餅及水溲餅南陽張衡字平子曰冬至陽氣歸內中熱物入胃易消化夏至陰氣潜內物入脾難消化距四時不欲食迎節之物所謂不時傷性損年穎川陳紀字元方曰百病橫生年命橫天多由飲食之患過於聲色聲色可絶之逾年飲食不可廢之一日為益亦大為惡且切審滋味百品或氣勢相代觸其禁忌便成疹毒緩者積而疹急者交而暴至於飲酒啖棗令人昏悶此甚驗也高平王熙字叔食曰食不欲雜雜則有相犯者當時或無灾患積久為人作疾又夏至迄秋分節食肥膩餅臛之屬此物與酒水苽果相妨當時不必皆病入秋節變陽消陰寒氣總至輒多諸暴卒病厲由於涉夏取冷太過飲食不節故也而惑者以病至之日便謂是受病之始不知其所由來者漸矣至言總卷之三
